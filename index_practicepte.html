<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <title>Practice PTE Online</title>
</head>
<body>
    <h1>Redirecting to your test...</h1>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const test = urlParams.get('test');
        if (type && test) {
            window.location.href = `./${type}/${test}/`;
        } else {
            document.body.innerHTML = '<h1>Welcome to Practice PTE Online</h1><p>Please use the links provided in your Google Sheet to access your tests.</p>';
        }
    </script>
</body>
</html>
